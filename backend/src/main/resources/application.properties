# Configuracao principal (padrao seguro para producao)
spring.application.name=projeto-spring-backend

# Perfil ativo (sobrescrever via SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# DataSource
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# Server
server.port=${SERVER_PORT:8080}
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# CORS (separar multiplas origens com virgula)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# JWT (chave em BASE64)
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
app.jwt.issuer=${APP_JWT_ISSUER:agricultura-api}

# Cookie de autenticacao
app.security.cookie.secure=${APP_COOKIE_SECURE:true}
app.security.cookie.same-site=${APP_COOKIE_SAME_SITE:Lax}

# Features por ambiente
app.swagger.enabled=${APP_SWAGGER_ENABLED:false}
app.seeder.enabled=${APP_SEEDER_ENABLED:false}

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# Rate Limiting
app.rate-limit.enabled=${APP_RATE_LIMIT_ENABLED:true}
app.rate-limit.requests-per-minute=${APP_RATE_LIMIT_REQUESTS_PER_MINUTE:60}

# Logging
logging.level.com.agricultura=${LOG_LEVEL_COM_AGRICULTURA:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.hibernate=${LOG_LEVEL_HIBERNATE:WARN}
