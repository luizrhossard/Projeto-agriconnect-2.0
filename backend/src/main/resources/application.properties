# Configuração Principal do Spring Boot
spring.application.name=projeto-spring-backend

# Perfil Ativo (sobrescrever em produção via SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# DataSource (valores padrão APENAS para desenvolvimento - ver application-dev.properties)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agricultura_dev}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dev_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dev_password_!2x_2024}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# Server
server.port=${SERVER_PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# CORS (separar múltiplas origens com vírgula)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# JWT (chave em BASE64 - gerar com: openssl rand -base64 32)
app.jwt.secret=${APP_JWT_SECRET:cHJveWV0by1zcHJpbmctYWdyaWN1bHR1cmEtc2VjcmV0LWtleS0yMDI0LW11aXRvLXNlZ3VyYS1lLWxvbmdhLTEyMzQ1Njc4OTA=}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
app.jwt.issuer=${APP_JWT_ISSUER:agricultura-api}

# Logging
logging.level.com.agricultura=${LOG_LEVEL_COM_AGRICULTURA:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.hibernate=${LOG_LEVEL_HIBERNATE:WARN}